global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "booking-service"
    metrics_path: /api/bookings/metrics
    static_configs:
      - targets: ["host.docker.internal"]

  - job_name: "auth-service"
    metrics_path: /api/auth/metrics
    static_configs:
      - targets: ["host.docker.internal"]

  - job_name: "ai-service"
    metrics_path: /api/ai/metrics
    static_configs:
      - targets: ["host.docker.internal"]