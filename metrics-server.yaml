apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server

spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: metrics-server

  template:
    metadata:
      labels:
        k8s-app: metrics-server

    spec:
      serviceAccountName: metrics-server

      containers:
        - name: metrics-server
          image: registry.k8s.io/metrics-server/metrics-server:v0.8.1
          imagePullPolicy: IfNotPresent

          args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s

          ports:
            - containerPort: 10250
              name: https
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10

          resources:
            requests:
              cpu: 100m
              memory: 200Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir

      volumes:
        - name: tmp-dir
          emptyDir: {}

      nodeSelector:
        kubernetes.io/os: linux

      priorityClassName: system-cluster-critical